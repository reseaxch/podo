name: Deploy Vercel production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy main to production
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://podo-alpha.vercel.app
    env:
      BUN_VERSION: 1.3.10
      NODE_VERSION: 22.23.1
      VERCEL_CLI_VERSION: 48.1.6
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERIFIED_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Check out verified main commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.VERIFIED_SHA }}
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pinned Vercel CLI
        run: npm install --global vercel@${{ env.VERCEL_CLI_VERSION }}

      - name: Require verified SHA to remain current main before build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$current_sha" != "$VERIFIED_SHA" ]]; then
            echo "Refusing stale build: main=$current_sha verified=$VERIFIED_SHA"
            exit 1
          fi

      - name: Pull production configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Require verified SHA to remain current main before deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$current_sha" != "$VERIFIED_SHA" ]]; then
            echo "Refusing stale deploy: main=$current_sha verified=$VERIFIED_SHA"
            exit 1
          fi

      - name: Deploy production artifact
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" \
            --meta githubCommitSha="$VERIFIED_SHA" \
            --meta githubCommitRef=main \
            --meta githubOrg="$GITHUB_REPOSITORY_OWNER" \
            --meta githubRepo="${GITHUB_REPOSITORY#*/}" \
            --meta verifiedMainSha="$VERIFIED_SHA"
