name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.10

jobs:
  workspace:
    name: Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run workspace checks
        run: bun run check

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check dashboard formatting
        run: bun run --cwd apps/dashboard format:check
      - name: Lint dashboard
        run: bun run --cwd apps/dashboard lint
      - name: Test dashboard
        run: bun run --cwd apps/dashboard test
      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run dashboard browser tests
        env:
          PODO_DASHBOARD_E2E_CORE_PORT: 4110
          PODO_DASHBOARD_E2E_PORT: 3010
        run: bun run --cwd apps/dashboard test:e2e
      - name: Run real Core browser flow
        env:
          PODO_DASHBOARD_CORE_E2E_CORE_PORT: 4120
          PODO_DASHBOARD_CORE_E2E_PORT: 3020
        run: bun run --cwd apps/dashboard test:e2e:core

  codex-compatibility:
    name: Codex compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install pinned Codex CLI
        run: npm install --global @openai/codex@0.144.1
      - name: Verify pinned Codex compatibility
        run: |
          codex --version
          bun run codex:smoke
